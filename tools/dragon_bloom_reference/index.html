<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dragon Bloom reference (butterchurn / source.milk)</title>
<style>html,body{margin:0;background:#000;overflow:hidden}#c{display:block}</style>
</head>
<body>
<canvas id="c" width="640" height="480"></canvas>
<script src="./butterchurn.min.js"></script>
<script>
window.__status = { ready:false, ctxState:'none', elapsed:0, err:null, audioRMS:0 };

// Hand-written GLSL warp body — faithful translation of source.milk warp_1..21
// (the chromatic colour-separation feedback shader). Replaces the broken
// converter output. Keeps the converter's preamble + shader_body wrapper.
function fixWarpShader(w) {
  const corrected =
`vec4 main_shader_sentinel(vec2 uv) {
    vec3 ret;
    ret = texture(sampler_main, (uv-0.5)*1.0 + 0.5).xyz;
    ret /= (ret.x + ret.y + ret.z);
    float zoom = dot(ret, vec3(1.0, 0.975, 0.95));
    ret.xyz = texture(sampler_main, (uv-0.5)*zoom + 0.5).xyz;
    float r = 0.02;
    vec3 xfer = clamp((ret - 0.05)*99.0, 0.0, 1.0);
    xfer.yz *= clamp((0.1 - ret.xy)*99.0, 0.0, 1.0);
    ret += xfer.xxx*vec3(-1.0,1.0,0.0)*r*0.7;
    ret += xfer.yyy*vec3(0.0,-1.0,1.0)*r*4.0;
    ret += xfer.zzz*vec3(0.0,0.0,-1.0)*r;
    vec2 dither_uv = uv_orig*texsize.xy*texsize_noise_lq.zw + rand_frame.xy;
    ret += (texture(sampler_noise_lq, dither_uv).xyz-0.5)/256.0*vec3(1.0,3.0,8.0)*5.0;
    return vec4(ret, 1.0);
}
`;
  const a = w.indexOf('vec4 main_shader_sentinel');
  const b = w.indexOf('shader_body');
  if (a < 0 || b < 0) return w;
  return w.slice(0, a) + corrected + ' ' + w.slice(b);
}
(async function(){
  try {
    const bc = (window.butterchurn && window.butterchurn.default) ? window.butterchurn.default : window.butterchurn;
    const canvas = document.getElementById('c');
    const W = 640, H = 480;                 // 4:3 — Milkdrop's projection assumes it (the (x-.5)*0.75 squish)

    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    window.__ctx = ctx;
    try { await ctx.resume(); } catch(e){}
    window.__status.ctxState = ctx.state;

    // Decode the recorded session audio.
    const wavBuf = await (await fetch('./audio.wav')).arrayBuffer();
    const audioBuf = await ctx.decodeAudioData(wavBuf);

    // source -> analyser(for monitoring) -> gain(0) -> destination (drives the clock, silent)
    window.__status.bufDur = audioBuf.duration;
    const src = ctx.createBufferSource();
    src.buffer = audioBuf;
    src.loop = true;
    // Boost: the recorded tap is ~-18 dB, far quieter than butterchurn's
    // expected level scale. The preset's per-pixel `zoom *= min(1.05, max(1,
    // max(bass,treb)))` only counteracts the baseline inward zoom (0.99951)
    // when bands exceed 1.0 — so quiet input collapses the bloom to a central
    // blob. Boost feeds butterchurn a loud signal so the bloom holds + builds.
    const urlBoost = parseFloat(new URLSearchParams(location.search).get('boost'));
    const boost = ctx.createGain(); boost.gain.value = isFinite(urlBoost) ? urlBoost : 4.0;
    window.__boostNode = boost;
    const mon = ctx.createAnalyser(); mon.fftSize = 2048;
    const g = ctx.createGain(); g.gain.value = 0.0001;   // silent sink, keeps graph pulled
    src.connect(boost); boost.connect(mon); mon.connect(g); g.connect(ctx.destination);

    const viz = bc.createVisualizer(ctx, canvas, { width:W, height:H, pixelRatio:1, textureRatio:1 });
    window.__viz = viz;
    viz.connectAudio(boost);               // butterchurn taps its own analyser off the BOOSTED node
    const preset = await (await fetch('./dragon_ref_preset.json')).json();
    // FIX: the offline milkdrop-preset-converter (Node) mistranslated the custom
    // HLSL warp shader — every operator became `bvecN(..) && bvecN(..)`, so the
    // feedback warp was garbage and the harness rendered crisp strands with no
    // feathering (did not resemble target_animated.gif). The wrapper/ABI
    // (main_shader_sentinel(uv) -> shader_body; sampler_main/uv_orig/texsize
    // uniforms) is intact, so we hand-write the correct GLSL body (a faithful
    // translation of source.milk warp_1..21) and splice it in. With this, the
    // harness reproduces the warm dense feathered bloom of the references.
    preset.warp = fixWarpShader(preset.warp);
    viz.loadPreset(preset, 0.0);
    viz.setRendererSize(W, H);

    src.start(0);
    window.__status.ready = true;
    const t0 = performance.now();
    const td = new Uint8Array(mon.fftSize);
    function frame(){
      viz.render();
      window.__status.elapsed = (performance.now()-t0)/1000;
      window.__status.ctxState = ctx.state;
      mon.getByteTimeDomainData(td);
      let s=0; for(let i=0;i<td.length;i+=32){const v=(td[i]-128)/128; s+=v*v;}
      window.__status.audioRMS = Math.sqrt(s/(td.length/32));
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  } catch(e){
    window.__status.err = (e && e.message) ? e.message : String(e);
    console.error('REF_ERR', e);
  }
})();
</script>
</body>
</html>
