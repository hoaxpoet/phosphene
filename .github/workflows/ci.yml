# Phosphene CI — fast gate (CLEAN.5.1 / 5.3).
#
# Scope (decided 2026-06-15): build + lint + doc/string/sample-rate gates +
# a GPU/fixture-free LOGIC-TEST subset, required-green on `main`. The heavy
# GPU + licensed-fixture + perf-timing suites stay the manual
# `Scripts/closeout_evidence.sh` gate — see docs/RUNBOOK.md §Gate structure.
#
# Why not the full suite here: 74 tests create a Metal device (fail, not skip,
# without a GPU), the tempo fixtures are licensed/gitignored, and perf-timing
# asserts flake under shared-runner contention.

name: CI fast gate

on:
  push:
    branches: [main]
  pull_request:

# Supersede in-flight runs on a new push to the same ref (saves runner minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    # macos-26 (GA 2026-02; arm64) ships Xcode 26 — required: the codebase stores
    # Metal protocol types (MTLDevice/MTLCommandQueue/MTLRenderPipelineState) in
    # Sendable types, and those `: Sendable` SDK conformances only exist from the
    # Xcode-26 SDK. macos-14 (Xcode 16.2 / Swift 6.0.3) red-built all 18 with
    # "non-sendable type 'any MTL…'". The BUILD SDK must be Xcode 26; the
    # DEPLOYMENT TARGET stays macOS 14.0 (set in pbxproj / Package.swift), which
    # that SDK still targets — build SDK != run target.
    runs-on: macos-26
    steps:
      # SHA-pinned for supply-chain reproducibility (CLEAN.5.4e, folds in 5.7).
      # Bump: take the target tag's commit from
      #   git ls-remote --tags https://github.com/actions/checkout
      # and update the SHA + the trailing `# vX.Y.Z` comment together.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (Node 24; Node 20 actions deprecated 2026-06-16)
        with:
          lfs: true # build bundles ML weights (PhospheneEngine/Sources/ML/Weights/**/*.bin)

      # Select the EXACT Xcode declared in .xcode-version (CLEAN.5.4a) — not
      # "newest wins". The Xcode-26 SDK is the real floor: it marks Metal protocol
      # types Sendable, Xcode 16 does not (that was CI run #1's red). Fails LOUD if
      # the declared version isn't on the image — that means the runner image
      # rotated the point release, so bump .xcode-version (it's a pin bump, not a
      # code regression). Dev box matches (RUNBOOK §Preconditions).
      - name: Select Xcode (pinned)
        run: |
          ver=$(cat .xcode-version)
          app="/Applications/Xcode_${ver}.app"
          if [ ! -d "$app" ]; then
            echo "::error::Pinned Xcode ${ver} not at ${app}. Installed:"
            ls -d /Applications/Xcode_*.app 2>/dev/null || echo "  (none)"
            echo "Image rotated the point release — bump .xcode-version to an installed version."
            exit 1
          fi
          sudo xcode-select -s "$app"
          xcodebuild -version
          swift --version

      # Fail fast if Git-LFS didn't smudge (CLEAN.5.4d): a pointer-file checkout
      # would bundle ~130-byte stubs for the ML weights and "build green".
      - name: Verify LFS smudged
        run: Scripts/check_lfs_smudged.sh

      # Catches the #1 regression class (compile breaks) with no GPU. Signing is
      # disabled — there's no Developer cert in CI and we ship no artifact here.
      # Build from the committed Package.resolved files (CLEAN.5.4c) — fail on
      # dep-graph drift instead of silently floating transitive SPM deps. The app
      # build reads PhospheneApp.xcodeproj/…/swiftpm/Package.resolved; the engine
      # build reads PhospheneEngine/Package.resolved. Both pin the same 4 deps.
      - name: Build (app + engine, signing disabled, deps pinned)
        run: |
          xcodebuild -scheme PhospheneApp -destination 'platform=macOS' \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO build
          swift build --package-path PhospheneEngine \
            --only-use-versions-from-resolved-file

      # Pinned to the dev version (CLEAN.5.4b) — NOT `brew install` latest, which
      # floats (0.63.3 ≠ dev 0.63.2 was CI run #2's red). Download the exact
      # portable binary (universal; runs on arm64). Bump: change SWIFTLINT_VERSION
      # here AND the dev version in RUNBOOK §Preconditions together.
      - name: SwiftLint (strict, pinned)
        env:
          SWIFTLINT_VERSION: "0.63.2"
        run: |
          curl -sSfL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o /tmp/swiftlint.zip
          unzip -oq /tmp/swiftlint.zip -d /tmp/swiftlint
          got=$(/tmp/swiftlint/swiftlint version)
          [ "$got" = "$SWIFTLINT_VERSION" ] || { echo "::error::SwiftLint ${got} ≠ pinned ${SWIFTLINT_VERSION}"; exit 1; }
          /tmp/swiftlint/swiftlint lint --strict --config .swiftlint.yml

      - name: Doc gates (DocIntegrityTests)
        run: swift test --package-path PhospheneEngine --filter DocIntegrityTests

      # Option A lean allow-list (CLEAN.5.1). Suites with NO GPU/Metal, NO
      # licensed fixtures, and NO external-app runtime (headless runner has no
      # Apple Music — `PlaylistConnector`'s appleMusic* tests throw
      # `.appleMusicNotRunning` here though they pass on a dev Mac; that suite
      # stays in the manual closeout gate, like the licensed-fixture suites).
      # NOTE: `--filter` matches the TYPE name (struct/class), NOT the
      # @Suite("display") string — `PresetScorer` matches `struct
      # PresetScorerTests`; `DefaultPresetScorer` would match nothing.
      # UNDER-COVERS BY DESIGN: a new pure-logic suite is NOT run until added
      # here. Widening to a full-suite-minus-skip-list is the CLEAN.5.1 Option-B
      # follow-up (prove the macos-26 runner has a working Metal device first).
      - name: Logic tests (GPU/fixture/external-app-free subset)
        run: |
          swift test --package-path PhospheneEngine \
            --filter ConcurrencyAuditProbeTests \
            --filter SpotifyTokenProvider \
            --filter SpotifyWebAPIConnector \
            --filter MetadataPreFetcher \
            --filter StreamingMetadata \
            --filter MoodClassifierGolden \
            --filter TrackPreparationStatus \
            --filter UserFacingError \
            --filter PresetScorer \
            --filter SessionPlanner \
            --filter TransitionPolicy \
            --filter BeatCardBuilder \
            --filter WeightChecksumTests

      - name: User-facing string lint (D-091)
        run: Scripts/check_user_strings.sh

      - name: Sample-rate literal lint (D-079)
        run: Scripts/check_sample_rate_literals.sh
